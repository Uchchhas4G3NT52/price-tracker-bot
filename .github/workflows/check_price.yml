name: Check Price

on:
  schedule:
    # Runs every 6 hours. Cron times are always in UTC.
    - cron: "0 */6 * * *"
  workflow_dispatch: # lets you trigger a run manually from the Actions tab

permissions:
  contents: write # needed so the workflow can commit the updated database

jobs:
  check-price:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v

      - name: Run price check
        env:
          TARGET_URL: ${{ vars.TARGET_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m tracker.main

      - name: Commit updated price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f price_history.db
          git diff --staged --quiet || git commit -m "Update price history [skip ci]"
          git push
